name: Deploy Stock Signal Site

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-stock-signal-site-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        shell: pwsh
        run: ./build_site.ps1

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@3 pages project list
          npx wrangler@3 pages project create daily-stock-signal --production-branch main || true
          npx wrangler@3 pages deploy site --project-name daily-stock-signal --commit-dirty=true
