name: Daily Stock Signal

on:
  schedule:
    # 17:23 Asia/Taipei, Monday-Friday.
    - cron: "23 9 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-stock-signal-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync market data
        run: python sync_today.py --workers 6 --mode auto

      - name: Build signal reports
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_MAX_ITEMS: "30"
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            python alert_signals.py --channel telegram --top-lists --top-count 5 --send-empty
          else
            echo "Telegram secrets are not configured; building reports without sending a notification."
            python alert_signals.py --dry-run --top-lists --top-count 5
          fi

      - name: Build static site
        shell: pwsh
        run: ./build_site.ps1

      - name: Commit generated data and reports
        shell: bash
        run: |
          shopt -s nullglob
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(
            data/all_twse/*.csv
            data/all_tpex/*.csv
            reports/daily_signal_alert.json
            reports/daily_signal_alert.csv
            reports/daily_signal_alert.txt
            reports/daily_signal_top_lists.json
            charts/daily_alert/*.png
          )
          if [ "${#files[@]}" -gt 0 ]; then
            git add -f "${files[@]}"
          fi
          git add .github/workflows/daily-signal.yml build_site.ps1 requirements.txt top_signal_rankings.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily stock signals"
            git pull --rebase origin main
            git push
          fi
