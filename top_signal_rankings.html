<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日強勢訊號榜</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #151923;
      --muted: #687082;
      --line: #d9dee8;
      --red: #b42318;
      --green: #067647;
      --blue: #175cd3;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      line-height: 1.5;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }
    main {
      padding: 24px 0 40px;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .section {
      margin-top: 24px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 20px;
      letter-spacing: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .card-body {
      padding: 14px 14px 12px;
    }
    .rank {
      display: inline-flex;
      min-width: 34px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: #edf2ff;
      color: var(--blue);
      font-weight: 800;
      margin-right: 8px;
    }
    .name {
      font-size: 18px;
      font-weight: 800;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .reason {
      margin-top: 8px;
      font-weight: 700;
    }
    .score {
      color: var(--red);
      font-weight: 800;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      margin-top: 10px;
      font-size: 14px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel);
    }
    footer {
      padding: 20px 0 32px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>每日強勢訊號榜</h1>
      <a href="index.html">回訊號看板</a>
    </div>
  </header>
  <main class="wrap">
    <div id="summary" class="summary">讀取中...</div>
    <section class="section">
      <h2>回檔最強前五名</h2>
      <div id="pullback" class="grid"></div>
    </section>
    <section class="section">
      <h2>突破最強前五名</h2>
      <div id="breakout" class="grid"></div>
    </section>
  </main>
  <footer class="wrap">本頁為策略篩選結果，不構成投資建議。</footer>
  <script>
    const reportUrl = "reports/daily_signal_top_lists.json";

    function text(value, fallback = "-") {
      return value === undefined || value === null || value === "" ? fallback : String(value);
    }

    function price(value) {
      return Number.isFinite(Number(value)) ? Number(value).toFixed(2) : "-";
    }

    function lots(value) {
      const number = Number(value);
      return Number.isFinite(number) ? `${Math.round(number / 1000).toLocaleString("zh-TW")}張` : "-";
    }

    function chartUrl(path) {
      if (!path) return "";
      const file = String(path).replaceAll("\\", "/").split("/").pop();
      return `charts/daily_alert/${file}`;
    }

    function card(item, index) {
      const reasons = Array.isArray(item.reasons) ? item.reasons.join("、") : text(item.reason);
      const scoreReasons = Array.isArray(item.score_reasons) ? item.score_reasons.slice(0, 3).join("、") : "";
      const image = chartUrl(item.chart_path);
      return `
        <article class="card">
          <div class="card-body">
            <div><span class="rank">${index + 1}</span><span class="name">${text(item.stock_no)} ${text(item.stock_name)}</span></div>
            <div class="meta">${text(item.market)} / ${text(item.date)}</div>
            <div class="reason">${reasons}</div>
            <div class="meta">評分 <span class="score">${text(item.score_label)}</span>${scoreReasons ? ` / ${scoreReasons}` : ""}</div>
            <div class="metrics">
              <div>收盤 ${price(item.close)}</div>
              <div>量 ${lots(item.volume)}</div>
              <div>20MA ${price(item.ma20)}</div>
              <div>60MA ${price(item.ma60)}</div>
            </div>
          </div>
          ${image ? `<img src="${image}" alt="${text(item.stock_no)} K線圖" loading="lazy">` : ""}
        </article>
      `;
    }

    function renderList(id, items) {
      const target = document.getElementById(id);
      if (!items || !items.length) {
        target.innerHTML = `<div class="empty">今天沒有符合條件的訊號。</div>`;
        return;
      }
      target.innerHTML = items.map(card).join("");
    }

    fetch(reportUrl, { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        const pullback = data.pullback || [];
        const breakout = data.breakout || [];
        const signalDate = text((pullback[0] || breakout[0] || {}).date);
        document.getElementById("summary").textContent =
          `訊號日期 ${signalDate} / 回檔 ${pullback.length} 檔 / 突破 ${breakout.length} 檔`;
        renderList("pullback", pullback);
        renderList("breakout", breakout);
      })
      .catch((error) => {
        document.getElementById("summary").textContent = `讀取失敗：${error.message}`;
        renderList("pullback", []);
        renderList("breakout", []);
      });
  </script>
</body>
</html>
